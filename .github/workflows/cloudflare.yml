name: Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Cloudflare after verification"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: false

env:
  BETTER_AUTH_URL: https://tong777.ccwu.cc
  BETTER_AUTH_TRUSTED_ORIGINS: ${{ vars.BETTER_AUTH_TRUSTED_ORIGINS }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
  STUDIO_INVITE_CODE: ${{ secrets.STUDIO_INVITE_CODE }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  verify:
    name: Verify Cloudflare bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check production environment
        run: bun run check:prod-env

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Build Next.js
        run: bun run build

      - name: Build Cloudflare Worker
        run: bun run build:cloudflare

      - name: Report Cloudflare bundle size
        run: |
          du -sh .open-next || true
          find .open-next -type f -printf "%s %p\n" | sort -nr | head -20

      - name: Require Cloudflare deploy credentials
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN GitHub secret is required for deploy."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID GitHub secret is required for deploy."
            exit 1
          fi

      - name: Write Cloudflare runtime secrets
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const requiredKeys = [
            "DATABASE_URL",
            "BETTER_AUTH_SECRET",
            "BETTER_AUTH_URL",
            "STUDIO_INVITE_CODE",
            "R2_ACCOUNT_ID",
            "R2_ACCESS_KEY_ID",
            "R2_SECRET_ACCESS_KEY",
            "R2_BUCKET",
            "R2_PUBLIC_BASE_URL",
          ];
          const optionalKeys = ["R2_ENDPOINT", "BETTER_AUTH_TRUSTED_ORIGINS"];
          const secrets = {};

          for (const key of requiredKeys) {
            const value = process.env[key]?.trim();

            if (!value) {
              console.error(`${key} GitHub secret or workflow env is required for deploy.`);
              process.exitCode = 1;
              continue;
            }

            secrets[key] = value;
          }

          for (const key of optionalKeys) {
            const value = process.env[key]?.trim();

            if (value) {
              secrets[key] = value;
            }
          }

          if (process.exitCode) {
            process.exit(process.exitCode);
          }

          fs.writeFileSync(".cloudflare-secrets.json", JSON.stringify(secrets));
          NODE

      - name: Deploy to Cloudflare
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        run: bunx wrangler deploy --secrets-file .cloudflare-secrets.json
